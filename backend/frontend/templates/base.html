<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}AI招聘趋势雷达{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/style.css?v=20260428-6">
  <script src="https://cdn.jsdelivr.net/npm/htmx.org@2/dist/htmx.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  {% block head %}{% endblock %}
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <span class="dot"></span> AI招聘趋势雷达
      </div>
      <nav class="sidebar-nav">
        <a href="/" {% if request.url.path == '/' %}class="active"{% endif %}>
          <span class="nav-icon">&#9632;</span> 今日雷达
        </a>
        <a href="/jobs" {% if request.url.path.startswith('/jobs') %}class="active"{% endif %}>
          <span class="nav-icon">&#9776;</span> 岗位证据库
        </a>
        <a href="/analytics" {% if request.url.path == '/analytics' %}class="active"{% endif %}>
          <span class="nav-icon">&#9733;</span> 能力趋势
        </a>
        <a href="/admin" {% if request.url.path == '/admin' %}class="active"{% endif %}>
          <span class="nav-icon">&#9881;</span> 数据源
        </a>
      </nav>
      <div style="margin-top: auto; padding-top: 1rem; border-top: 1px solid var(--c-border); font-size: 0.75rem; color: var(--c-text-secondary);">
        每日 9:00 更新<br>
        第三方聚合源优先<br>
        目标公司：字节跳动、腾讯、小红书、哔哩哔哩、快手、美团、阿里巴巴、京东、Meta、Google、Anthropic、Microsoft
      </div>
      <div class="sidebar-quote" id="sidebar-quote" aria-live="polite"></div>
    </aside>
    <main class="main-content">
      {% block content %}{% endblock %}
    </main>
  </div>
  <script src="/static/js/app.js?v=20260428-2"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
