{% extends "base.html" %}
{% block title %}AI招聘趋势雷达 - 岗位证据库{% endblock %}

{% block content %}
<div class="content-header" style="display:flex; justify-content:space-between; align-items:flex-start;">
  <div>
    <h1>岗位证据库</h1>
    <p>按公司、城市、岗位类型和关键词追溯 JD 原文，验证每条趋势背后的岗位证据。</p>
  </div>
  <a href="/api/analytics/export/csv" class="btn" style="margin-top:0.25rem;">导出 CSV</a>
</div>

<form id="filter-form"
      hx-get="/api/jobs"
      hx-trigger="change from:select, submit"
      hx-target="#job-results"
      hx-include="#filter-form">
  <div class="filter-bar">
    <select name="job_type">
      <option value="">全部类型</option>
      <option value="产品经理">产品经理</option>
      <option value="AI运营">AI运营</option>
      <option value="商业化/增长">商业化/增长</option>
      <option value="市场/品牌">市场/品牌</option>
      <option value="销售/客户成功">销售/客户成功</option>
      <option value="职能/支持">职能/支持</option>
      <option value="解决方案/交付">解决方案/交付</option>
      <option value="策略/分析">策略/分析</option>
      <option value="训练/标注/评测">训练/标注/评测</option>
      <option value="提示词工程">提示词工程</option>
      <option value="技术研发">技术研发</option>
      <option value="未识别">未识别</option>
    </select>
    <select name="location_city">
      <option value="">全部城市</option>
      <option value="北京">北京</option>
      <option value="上海">上海</option>
      <option value="深圳">深圳</option>
      <option value="杭州">杭州</option>
      <option value="成都">成都</option>
    </select>
    <select name="platform">
      <option value="">全部平台</option>
      <option value="third_party_serpapi">SerpApi Google Jobs</option>
      <option value="third_party_adzuna">Adzuna</option>
      <option value="tencent">腾讯</option>
      <option value="official_meituan">美团（官网）</option>
      <option value="official_anthropic">Anthropic（官网）</option>
      <option value="bytedance">字节跳动（历史/不稳定）</option>
    </select>
    <input type="text" name="keyword" placeholder="搜索 Agent / RAG / 评测..." style="width:230px;">
    <button type="submit" class="btn">搜索证据</button>
  </div>
</form>

<div class="card">
  <div id="job-results"
       hx-get="/api/jobs?page=1&per_page=20"
       hx-trigger="load"
       hx-include="#filter-form">
    <p style="color: var(--c-text-secondary);">加载中…</p>
  </div>
</div>
{% endblock %}
