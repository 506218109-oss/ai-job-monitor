{% extends "base.html" %}
{% block title %}AI求职趋势雷达 - 能力趋势{% endblock %}

{% block content %}
<div class="content-header">
  <h1>能力趋势</h1>
  <p>把腾讯、字节 JD 拆成 AI 技术认知、产品能力、数据能力、业务商业化和通用协作能力，辅助判断简历与面试准备重点。</p>
</div>

<div id="analytics-content" hx-get="/api/analytics/overview" hx-trigger="load">
  <p style="color: var(--c-text-secondary);">加载中…</p>
</div>
{% endblock %}

{% block scripts %}
<script>
document.body.addEventListener('htmx:afterSwap', function(evt) {
  if (evt.detail.target.id !== 'analytics-content') return;
  const data = JSON.parse(evt.detail.xhr.responseText);

  if (!data.total_active) {
    document.getElementById('analytics-content').innerHTML =
      '<div style="text-align:center;padding:3rem;color:var(--c-text-secondary);">' +
      '<h3>暂无数据</h3><p style="margin:0.5rem 0 1rem;">请先执行抓取获取数据</p>' +
      '<a href="/admin" class="btn btn-primary">前往管理面板</a></div>';
    return;
  }

  const colors = ['#0066ff','#7c3aed','#16a34a','#ea580c','#0891b2','#db2777','#ca8a04','#2563eb',
                  '#9333ea','#059669','#ea580c','#0e7490','#be185d','#a16207','#1d4ed8'];

  document.getElementById('analytics-content').innerHTML = `
    <div class="grid-2" style="margin-bottom:1.5rem;">
      <div class="card">
        <div class="section-title">岗位类型分布</div>
        <div class="chart-box"><canvas id="chartType"></canvas></div>
      </div>
      <div class="card">
        <div class="section-title">能力关键词 Top 15</div>
        <div class="chart-box" style="min-height:380px;"><canvas id="chartSkills"></canvas></div>
      </div>
    </div>
    <div class="grid-2" style="margin-bottom:1.5rem;">
      <div class="card">
        <div class="section-title">公司样本占比</div>
        <div class="chart-box"><canvas id="chartCompany"></canvas></div>
      </div>
      <div class="card">
        <div class="section-title">城市分布</div>
        <div class="chart-box"><canvas id="chartCity"></canvas></div>
      </div>
    </div>
    <div class="card" style="margin-bottom:1.5rem;">
      <div class="section-title">能力分层与求职解释</div>
      <div id="skill-groups"><p style="color:var(--c-text-secondary);">加载中…</p></div>
    </div>
    <div class="card" style="margin-bottom:1.5rem;">
      <div class="section-title">7/30 天新增、更新、下线趋势</div>
      <div id="event-trends-detail"><p style="color:var(--c-text-secondary);">加载中…</p></div>
    </div>
    <div class="grid-2" style="margin-bottom:1.5rem;">
      <div class="card">
        <div class="section-title">趋势证据样例</div>
        <div id="evidence-examples"><p style="color:var(--c-text-secondary);">加载中…</p></div>
      </div>
      <div class="card">
        <div class="section-title">按岗位类型准备</div>
        <div id="role-advice"><p style="color:var(--c-text-secondary);">加载中…</p></div>
      </div>
    </div>
  `;

  new Chart(document.getElementById('chartType'), {
    type: 'doughnut',
    data: {
      labels: data.top_types.map(d => d.type),
      datasets: [{
        data: data.top_types.map(d => d.count),
        backgroundColor: colors.slice(0, data.top_types.length),
        borderWidth: 2, borderColor: '#fff'
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: true, cutout: '60%',
      plugins: { legend: { position: 'bottom', labels: { padding: 14, usePointStyle: true, font: { size: 12 } } } }
    }
  });

  if (data.top_skills) {
    const skills = data.top_skills.slice(0, 15);
    new Chart(document.getElementById('chartSkills'), {
      type: 'bar',
      data: {
        labels: skills.map(s => s.name_cn || s.name),
        datasets: [{
          label: '提及次数', data: skills.map(s => s.count),
          backgroundColor: colors.slice(0, skills.length),
          borderRadius: 4, borderSkipped: false
        }]
      },
      options: {
        indexAxis: 'y', responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: { x: { grid: { color: '#f0f0ee' } } }
      }
    });
  }

  if (data.top_companies) {
    new Chart(document.getElementById('chartCompany'), {
      type: 'bar',
      data: {
        labels: data.top_companies.map(d => d.name),
        datasets: [{
          label: '岗位数', data: data.top_companies.map(d => d.count),
          backgroundColor: colors[6], borderRadius: 4, borderSkipped: false
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: true,
        plugins: { legend: { display: false } },
        scales: { x: { grid: { display: false } }, y: { grid: { color: '#f0f0ee' } } }
      }
    });
  }

  fetch('/api/analytics/insights')
    .then(r => r.json())
    .then(insights => {
      renderCityChart(insights.city_distribution || [], colors);
      renderSkillGroups(insights.skill_groups || []);
      renderEventTrendsDetail(insights.event_trends || {});
      renderEvidence(insights.evidence_examples || {});
      renderRoleAdvice(insights.career_advice || []);
    });
});

function renderCityChart(cities, colors) {
  new Chart(document.getElementById('chartCity'), {
    type: 'bar',
    data: {
      labels: cities.map(d => d.city),
      datasets: [{
        label: '岗位数', data: cities.map(d => d.count),
        backgroundColor: colors[4], borderRadius: 4, borderSkipped: false
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: true,
      plugins: { legend: { display: false } },
      scales: { x: { grid: { display: false } }, y: { grid: { color: '#f0f0ee' } } }
    }
  });
}

function renderSkillGroups(groups) {
  if (!groups.length) return;
  let html = '<div class="ability-grid">';
  groups.forEach(group => {
    html += '<div class="ability-group">';
    html += '<h4>' + escapeHtml(group.label) + '</h4>';
    html += '<div class="tag-row">';
    group.skills.slice(0, 6).forEach(skill => {
      html += '<span class="tag tag-blue">' + escapeHtml(skill.name) + ' ' + skill.pct + '%</span>';
    });
    html += '</div>';
    html += '</div>';
  });
  html += '</div>';
  document.getElementById('skill-groups').innerHTML = html;
}

function renderEventTrendsDetail(trends) {
  const windows = trends.windows || {};
  let html = '<div class="event-grid">';
  ['7', '30'].forEach(key => {
    const item = windows[key];
    if (!item) return;
    html += '<div class="event-card">';
    html += '<h4>近 ' + item.days + ' 天</h4>';
    html += '<div class="event-metrics">';
    html += '<span><strong>' + item.new + '</strong><small>新增</small></span>';
    html += '<span><strong>' + item.updated + '</strong><small>更新</small></span>';
    html += '<span><strong>' + item.removed + '</strong><small>下线</small></span>';
    html += '<span><strong>' + item.reactivated + '</strong><small>重新上线</small></span>';
    html += '</div>';
    if (item.by_company && item.by_company.length) {
      html += '<table class="mini-table"><thead><tr><th>公司</th><th>新增</th><th>更新</th><th>下线</th></tr></thead><tbody>';
      item.by_company.slice(0, 4).forEach(company => {
        html += '<tr><td>' + escapeHtml(company.company) + '</td><td>' + company.new + '</td><td>' + company.updated + '</td><td>' + company.removed + '</td></tr>';
      });
      html += '</tbody></table>';
    }
    html += '</div>';
  });
  html += '</div>';
  document.getElementById('event-trends-detail').innerHTML = html;
}

function renderEvidence(examples) {
  const entries = Object.entries(examples).slice(0, 4);
  if (!entries.length) return;
  let html = '<div class="evidence-list">';
  entries.forEach(([concept, jobs]) => {
    html += '<div class="evidence-block"><h4>' + escapeHtml(concept) + '</h4>';
    jobs.slice(0, 2).forEach(job => {
      html += '<a class="evidence-link" href="/jobs/' + job.id + '">';
      html += '<strong>' + escapeHtml(job.title) + '</strong>';
      html += '<span>' + escapeHtml(job.company_name) + ' · ' + escapeHtml(job.location_city || '-') + ' · ' + escapeHtml(job.job_type) + '</span>';
      if (job.snippet) html += '<p>' + escapeHtml(job.snippet) + '</p>';
      html += '</a>';
    });
    html += '</div>';
  });
  html += '</div>';
  document.getElementById('evidence-examples').innerHTML = html;
}

function renderRoleAdvice(items) {
  if (!items.length) return;
  let html = '<div class="advice-list compact">';
  items.forEach(item => {
    html += '<div class="advice-card">';
    html += '<h4>' + escapeHtml(item.role) + '</h4>';
    html += '<p>' + escapeHtml(item.signal) + '</p>';
    html += '<ul>';
    item.prepare.slice(0, 2).forEach(point => { html += '<li>' + escapeHtml(point) + '</li>'; });
    html += '</ul></div>';
  });
  html += '</div>';
  document.getElementById('role-advice').innerHTML = html;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text || '';
  return div.innerHTML;
}
</script>
{% endblock %}
